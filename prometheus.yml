global:
  scrape_interval: 15s 

rule_files:
  - "alert_rules.yml"
  - "recording_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node_exporter:9100']

  - job_name: 'backend'
    static_configs:
      - targets: ['node_exporter:9100']

  - job_name: 'frontend'
    static_configs:
      - targets: ['node_exporter:9100']